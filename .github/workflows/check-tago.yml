name: Check TAGO API access

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Check four TAGO APIs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check TAGO APIs
        env:
          TAGO_SERVICE_KEY: ${{ secrets.TAGO_SERVICE_KEY }}
        run: pnpm tago:check
